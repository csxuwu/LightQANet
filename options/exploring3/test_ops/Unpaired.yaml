# general settings
name: &arch_type LightQANet_Arch  # LLIE_Prior_CS21_ReW_Arch LLIE_Prior_OS_Refer_Sem_Skip4231_arch  LLIE_Prior_PromptV2_5_Arch
# name: &arch_type LLIE_Prior_OS_Refer_Sem_Skip42_Arch
model_type: LightQANet_Model # LLIE_Prior_Prompt5_Model  LLIE_Prior_OS_Refer22_Exp3_Model
scale: &upscale 1
num_gpu: 1 # set num_gpu: 0 for cpu mode
manual_seed: 0
debug: false

path:
  pretrain_network_hq: pretrain_networks/pretrained_HQPs.pth
  pretrain_network_g: pretrain_networks/**.pth  # pretrained model weight

  # pretrain_network_g: /home/wuxu/codes/promptenhance/pretrain_networks/LLIE_Prior_PromptV2_5_Arch_LOLv2_Syn_Dataset_20250408_225600.pth
  pretrain_network_d: ~
  strict_load: false 

# dataset and data loader settings
