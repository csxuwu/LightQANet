    name: LSRW_Huawei_Dataset
    type: Unpaired_Dataset
    dataroot: /home/wuxu/datasets/LL/LSRW/Eval/Huawei/low
    is_reference: false
    reference_path: /home/wuxu/datasets/LL/AGLLNet/test_enhance
    is_noise: true
    # resize: 256   # 61 arch 用到，因为内存不够
    beta_range: [0.3, 1.5]
    A_range: [0.25, 1.0]
    color_p: 1.0
